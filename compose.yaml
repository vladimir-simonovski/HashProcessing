services:
  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  hashprocessing.api:
    image: hashprocessing.api
    build:
      context: src
      dockerfile: HashProcessing.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/hashprocessing.api.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${HTTPS_CERT_PASSWORD:-devpassword}
      - RabbitMQ__HostName=rabbitmq
      - ConnectionStrings__MariaDb=Server=mariadb;Database=api;User=root;Password=root;
    volumes:
      - ./.aspnet/https:/https:ro
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  hashprocessing.worker:
    image: hashprocessing.worker
    build:
      context: src
      dockerfile: HashProcessing.Worker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=rabbitmq
      - ConnectionStrings__MariaDb=Server=mariadb;Database=worker;User=root;Password=root;
    depends_on:
      rabbitmq:
        condition: service_healthy
      mariadb:
        condition: service_healthy

volumes:
  mariadb-data:

